<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>yapchat</title>
    <style>
      /* CSS Variables - Easy to customize */
      :root {
        --primary-color: #333;
        --secondary-color: #f0f0f0;
        --border-radius: 8px;
        --spacing-sm: 0.5rem;
        --spacing-md: 1rem;
        --spacing-lg: 1.5rem;
        --text-color: #222;
        --text-muted: #666;
        --background-light: #fafafa;
        --message-own-bg: #e3f2fd;
        --message-other-bg: #fff;
        --form-height: 4rem;
      }

      * {
        box-sizing: border-box;
      }

      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
      }

      body {
        display: flex;
        flex-direction: column;
        padding-bottom: var(--form-height);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, Helvetica, Arial, sans-serif;
        background: var(--background-light);
        color: var(--text-color);
      }

      /* Header with online count */
      #onlineCount {
        margin: 0;
        padding: var(--spacing-md) var(--spacing-lg);
        background: var(--primary-color);
        color: white;
        text-align: center;
        font-size: 0.95rem;
        font-weight: 500;
        border-bottom: 2px solid #222;
      }

      /* Messages container */
      #messages {
        list-style-type: none;
        margin: 0;
        padding: var(--spacing-md) 0;
        flex: 1;
        overflow-y: auto;
      }

      #messages > li {
        padding: var(--spacing-md) var(--spacing-lg);
        margin: 0.25rem 0;
        word-wrap: break-word;
        line-height: 1.5;
      }

      #messages > li:nth-child(even) {
        background: var(--message-other-bg);
      }

      #messages > li:nth-child(odd) {
        background: var(--secondary-color);
      }

      /* Form styling */
      #form {
        background: rgba(0, 0, 0, 0.08);
        padding: var(--spacing-sm);
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        display: flex;
        height: var(--form-height);
        gap: var(--spacing-sm);
        backdrop-filter: blur(10px);
        align-items: center;
        border-top: 1px solid #ddd;
      }

      #input {
        border: 1px solid #ddd;
        padding: var(--spacing-md);
        flex-grow: 1;
        border-radius: var(--border-radius);
        margin: 0;
        font-size: 1rem;
        background: white;
        transition: border-color 0.3s;
      }

      #input:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(51, 51, 51, 0.1);
      }

      #form > button {
        background: var(--primary-color);
        border: none;
        padding: var(--spacing-md) var(--spacing-lg);
        margin: 0;
        border-radius: var(--border-radius);
        outline: none;
        color: #fff;
        cursor: pointer;
        font-size: 1rem;
        font-weight: 500;
        transition: background 0.3s, transform 0.1s;
        white-space: nowrap;
      }

      #form > button:hover {
        background: #555;
      }

      #form > button:active {
        transform: scale(0.98);
      }
    </style>
  </head>

  <body>
    <h3 id="onlineCount">Online: 0</h3>
    <ul id="messages"></ul>

    <form id="form">
      <input id="input" autocomplete="off" placeholder="Type a message..." />
      <button>Send</button>
    </form>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <script>
      const socket = io("http://localhost:3000");

      const form = document.getElementById('form');
      const input = document.getElementById('input');
      const messages = document.getElementById('messages');

      let username = prompt("Enter your username:");
      if (!username || username.trim() === "") {
        username = "Anonymous";
      }
      
      socket.emit("user_joined",username);

      form.addEventListener('submit', function(e) {
        e.preventDefault();

        if (input.value.trim() !== "") {
          socket.emit("send_message", {
            username: username,
            message: input.value
          });

          input.value = '';
        }
      });

      socket.on("receive_message", function(data) {
        const item = document.createElement('li');
        item.textContent = data.username + ": " + data.message;
        messages.appendChild(item);
        window.scrollTo(0, document.body.scrollHeight);
      });

      socket.on("user_joined", function(name) {
        const item = document.createElement('li');
        item.textContent = name + " joined the chat";
        item.style.fontStyle = "italic";
        item.style.color = "green";
        messages.appendChild(item);
      });

      socket.on("user_disconnected", function(name) {
        const item = document.createElement('li');
        item.textContent = name + " disconnected from the chat";
        item.style.fontStyle = "italic";
        item.style.color = "red";
        messages.appendChild(item);
      });

      socket.on("chat_history", function(history) {
        history.forEach(function(data) {
          const item = document.createElement('li');
          item.textContent = data.username + ": " + data.message;
          messages.appendChild(item);
        });
      });

      socket.on("user_count", function(count) {
        document.getElementById("onlineCount").textContent = "Online: " + count;
      });
      
    </script>
  </body>
</html>
