<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>yapchat</title>
    <style>
      body {
        margin: 0;
        padding-bottom: 3rem;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, Helvetica, Arial, sans-serif;
      }

      #form {
        background: rgba(0, 0, 0, 0.15);
        padding: 0.25rem;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        display: flex;
        height: 3rem;
        box-sizing: border-box;
        backdrop-filter: blur(10px);
      }

      #input {
        border: none;
        padding: 0 1rem;
        flex-grow: 1;
        border-radius: 2rem;
        margin: 0.25rem;
      }

      #input:focus {
        outline: none;
      }

      #form > button {
        background: #333;
        border: none;
        padding: 0 1rem;
        margin: 0.25rem;
        border-radius: 3px;
        outline: none;
        color: #fff;
        cursor: pointer;
      }

      #messages {
        list-style-type: none;
        margin: 0;
        padding: 0;
      }

      #messages > li {
        padding: 0.5rem 1rem;
      }

      #messages > li:nth-child(odd) {
        background: #efefef;
      }
    </style>
  </head>

  <body>
    <h3 id="onlineCount">Online: 0</h3>
    <ul id="messages"></ul>

    <form id="form">
      <input id="input" autocomplete="off" placeholder="Type a message..." />
      <button>Send</button>
    </form>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <script>
      const socket = io("http://localhost:3000");

      const form = document.getElementById('form');
      const input = document.getElementById('input');
      const messages = document.getElementById('messages');

      let username = prompt("Enter your username:");
      if (!username || username.trim() === "") {
        username = "Anonymous";
      }
      
      socket.emit("user_joined",username);

      form.addEventListener('submit', function(e) {
        e.preventDefault();

        if (input.value.trim() !== "") {
          socket.emit("send_message", {
            username: username,
            message: input.value
          });

          input.value = '';
        }
      });

      socket.on("receive_message", function(data) {
        const item = document.createElement('li');
        item.textContent = data.username + ": " + data.message;
        messages.appendChild(item);
        window.scrollTo(0, document.body.scrollHeight);
      });

      socket.on("user_joined", function(name) {
        const item = document.createElement('li');
        item.textContent = name + " joined the chat";
        item.style.fontStyle = "italic";
        item.style.color = "green";
        messages.appendChild(item);
      });

      socket.on("user_disconnected", function(name) {
        const item = document.createElement('li');
        item.textContent = name + " disconnected from the chat";
        item.style.fontStyle = "italic";
        item.style.color = "red";
        messages.appendChild(item);
      });

      socket.on("chat_history", function(history) {
        history.forEach(function(data) {
          const item = document.createElement('li');
          item.textContent = data.username + ": " + data.message;
          messages.appendChild(item);
        });
      });

      socket.on("user_count", function(count) {
        document.getElementById("onlineCount").textContent = "Online: " + count;
      });
      
    </script>
  </body>
</html>
